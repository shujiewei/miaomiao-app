name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:        # 允许在 Actions 页面手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: 📦 Install npm dependencies
        run: npm install

      - name: 🛠 Build www/ assets (download CDN deps)
        run: npm run build:www

      - name: 📱 Add Android platform (Capacitor)
        run: npx cap add android

      - name: 🎨 Generate Android icons from resources/icon.png
        run: npx @capacitor/assets generate --android || echo "Asset gen failed, using default icon"

      - name: 🔄 Sync Capacitor (copy www -> android assets)
        run: npx cap sync android

      - name: 🈶 Set Chinese app name in strings.xml
        run: |
          STRINGS=android/app/src/main/res/values/strings.xml
          if [ -f "$STRINGS" ]; then
            sed -i 's|<string name="app_name">[^<]*</string>|<string name="app_name">喵喵小百科</string>|' "$STRINGS"
            sed -i 's|<string name="title_activity_main">[^<]*</string>|<string name="title_activity_main">喵喵小百科</string>|' "$STRINGS"
            echo "--- patched strings.xml ---"
            cat "$STRINGS"
          fi

      - name: 🔑 Inject explicit debug signing config + bump versionCode
        env:
          BUILD_NUMBER: ${{ github.run_number }}
          VERSION_NAME: '0.9'
        run: |
          set -e
          # 1) Ensure repo keystore exists; if not, generate fresh one
          if [ ! -f keystore/debug.keystore ]; then
            echo "🆕 仓库内还没有 keystore，生成一个新的（首次构建）"
            mkdir -p keystore
            keytool -genkeypair -noprompt \
              -keystore keystore/debug.keystore \
              -storepass android -alias androiddebugkey -keypass android \
              -keyalg RSA -keysize 2048 -validity 36500 \
              -dname "CN=Miaomiao Debug, O=Miaomiao, C=CN"
            echo "::warning::keystore 已生成，请下载 miaomiao-keystore artifact 并提交到 keystore/debug.keystore"
          else
            echo "✅ 使用仓库内已有的 keystore"
          fi

          # 2) Copy keystore INTO android project so build.gradle can reference it relatively
          cp keystore/debug.keystore android/app/debug.keystore

          # 3) Inject explicit signingConfigs.debug into android/app/build.gradle
          #    (Capacitor 7 / AGP 8+ ignores ~/.android/debug.keystore by default,
          #     so we MUST declare signingConfigs explicitly here.)
          BUILD_GRADLE=android/app/build.gradle
          if ! grep -q "signingConfigs" "$BUILD_GRADLE"; then
            {
              echo "    signingConfigs {"
              echo "        debug {"
              echo "            storeFile file('debug.keystore')"
              echo "            storePassword 'android'"
              echo "            keyAlias 'androiddebugkey'"
              echo "            keyPassword 'android'"
              echo "        }"
              echo "    }"
            } > /tmp/signing-block.gradle
            # Insert after the first "android {" line
            sed -i '/^android {/r /tmp/signing-block.gradle' "$BUILD_GRADLE"
            echo "✅ Injected explicit signingConfigs.debug into build.gradle"
          else
            echo "ℹ️  signingConfigs already present"
          fi

          # 4) Bump versionCode (use GitHub run_number for monotonic unique numbers)
          #    and versionName (semantic). Without this, Android refuses "same version" reinstall.
          sed -i "s/versionCode [0-9]\+/versionCode ${BUILD_NUMBER}/" "$BUILD_GRADLE"
          sed -i "s/versionName \"[^\"]*\"/versionName \"${VERSION_NAME}\"/" "$BUILD_GRADLE"

          echo ""
          echo "--- patched android/app/build.gradle ---"
          cat "$BUILD_GRADLE"

          echo ""
          echo "--- keystore identity ---"
          keytool -list -v -keystore keystore/debug.keystore -storepass android 2>&1 | grep -E "(Owner|SHA1|SHA256|Alias|Valid)" || true

      - name: 📤 Upload keystore artifact (一次性下载提交到仓库)
        uses: actions/upload-artifact@v4
        with:
          name: miaomiao-keystore
          path: keystore/debug.keystore
          retention-days: 90

      - name: 🔨 Build Debug APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: 📝 Rename APK
        run: |
          mkdir -p out
          cp android/app/build/outputs/apk/debug/app-debug.apk out/miaomiao-v0.9-debug.apk
          ls -lh out/

      - name: ⬆️ Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: miaomiao-debug-apk
          path: out/miaomiao-v0.9-debug.apk
          retention-days: 30

      - name: 🎉 Summary
        run: |
          echo "## ✅ APK 构建成功！" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "下载方式：" >> $GITHUB_STEP_SUMMARY
          echo "1. 在本次 Action 运行页面下拉到 **Artifacts** 区" >> $GITHUB_STEP_SUMMARY
          echo "2. 点击 \`miaomiao-debug-apk\` 下载 zip" >> $GITHUB_STEP_SUMMARY
          echo "3. 解压得到 \`miaomiao-v0.9-debug.apk\`，传到安卓手机安装" >> $GITHUB_STEP_SUMMARY
